apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: embedding-drift-monitor
  namespace: monitoring
  labels:
    app: embedding-drift-monitor
    release: prometheus
spec:
  selector:
    matchLabels:
      app: embedding-drift-monitor
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    honorLabels: true
  - port: health
    path: /health
    interval: 60s
    scrapeTimeout: 5s
  namespaceSelector:
    matchNames:
    - default
    - production