apiVersion: v1
kind: ConfigMap
metadata:
  name: embedding-drift-monitor-config
  namespace: default
  labels:
    app: embedding-drift-monitor
data:
  # Drift detection settings
  DRIFT_THRESHOLD: "0.85"
  SIMILARITY_THRESHOLD: "0.75"
  ANOMALY_THRESHOLD: "2.5"
  BATCH_SIZE: "100"
  
  # Time windows
  BASELINE_WINDOW_HOURS: "24"
  COMPARISON_WINDOW_HOURS: "1"
  ALERT_COOLDOWN_MINUTES: "30"
  
  # Circuit breaker
  CIRCUIT_BREAKER_THRESHOLD: "5"
  CIRCUIT_BREAKER_TIMEOUT: "60"
  
  # Database
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "5"
  DB_TIMEOUT: "30"
  
  # Monitoring
  METRICS_PORT: "8080"
  HEALTH_CHECK_INTERVAL: "30"
  
  # Logging
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"