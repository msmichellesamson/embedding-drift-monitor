apiVersion: v1
kind: Service
metadata:
  name: embedding-drift-monitor
  labels:
    app: embedding-drift-monitor
spec:
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: embedding-drift-monitor
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: embedding-drift-monitor
spec:
  http:
  - match:
    - uri:
        prefix: /api/v1/drift
    route:
    - destination:
        host: embedding-drift-monitor
        port:
          number: 8080
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: embedding-drift-monitor
spec:
  host: embedding-drift-monitor
  trafficPolicy:
    circuitBreaker:
      consecutiveErrors: 5
      interval: 30s
      baseEjectionTime: 30s
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        maxRequestsPerConnection: 10